name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger

# Force Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel any in-progress runs for the same branch to avoid queue buildup
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Patch deprecated jcenter() in node_modules
        run: |
          echo "Patching react-native-sqlite-storage to remove jcenter()..."
          find node_modules -name "build.gradle" -exec grep -l "jcenter()" {} \; | while read f; do
            echo "  Patching: $f"
            sed -i 's/jcenter()/mavenCentral()/g' "$f"
          done
          echo "Patch complete."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Cache Gradle wrapper & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (arm64 only for speed)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --max-workers=2 \
            --console=plain \
            --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyDisciplineTracker-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
