name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger

# Force Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel any in-progress runs for the same branch to avoid queue buildup
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Patch deprecated Gradle APIs in node_modules
        run: |
          echo "=== Patching jcenter() -> mavenCentral() ==="
          find node_modules -name "build.gradle" -exec grep -l "jcenter()" {} \; | while read f; do
            echo "  Patching jcenter: $f"
            sed -i 's/jcenter()/mavenCentral()/g' "$f"
          done

          echo "=== Patching lintOptions -> lint ==="
          find node_modules -name "build.gradle" -exec grep -l "lintOptions" {} \; | while read f; do
            echo "  Patching lintOptions: $f"
            sed -i 's/lintOptions/lint/g' "$f"
          done

          echo "=== Patching compile -> implementation in old dependencies ==="
          # Some old libraries use 'compile' instead of 'implementation'
          find node_modules -name "build.gradle" | while read f; do
            if grep -q "^\s*compile " "$f" 2>/dev/null; then
              echo "  Patching compile->implementation: $f"
              sed -i 's/^\(\s*\)compile /\1implementation /g' "$f"
            fi
          done

          echo "Patch complete."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Cache Gradle wrapper & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (arm64 only for speed)
        working-directory: android
        run: |
          set +e
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --max-workers=2 \
            --console=plain \
            --info 2>&1 | tee /tmp/build_output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=========================================="
            echo "  BUILD FAILED - Full Error Details"
            echo "=========================================="
            echo ""
            # Show the FAILURE block
            grep -B 2 -A 20 "FAILURE: Build failed" /tmp/build_output.log || true
            echo ""
            echo "=========================================="
            echo "  Failed Tasks:"
            echo "=========================================="
            grep -i "FAILED$\|execution failed for task" /tmp/build_output.log || true
            echo ""
            echo "=========================================="
            echo "  Last 100 lines:"
            echo "=========================================="
            tail -100 /tmp/build_output.log
            exit 1
          fi

      # Always upload build log if build fails
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: /tmp/build_output.log
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyDisciplineTracker-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
