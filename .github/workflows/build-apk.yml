name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Patch deprecated Gradle APIs in node_modules
        run: |
          find node_modules -name "build.gradle" -exec grep -l "jcenter()" {} \; | while read f; do
            echo "Patching jcenter: $f"
            sed -i 's/jcenter()/mavenCentral()/g' "$f"
          done
          find node_modules -name "build.gradle" -exec grep -l "lintOptions" {} \; | while read f; do
            echo "Patching lintOptions: $f"
            sed -i 's/lintOptions/lint/g' "$f"
          done

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        id: build
        continue-on-error: true
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --max-workers=2 \
            --console=plain \
            --stacktrace 2>&1 | tee /tmp/full_build.log

      - name: Extract error details on failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "##[group]FAILURE DETAILS"
          echo ""
          echo "===== FAILED TASKS ====="
          grep "FAILED$" /tmp/full_build.log || echo "No FAILED tasks found"
          echo ""
          echo "===== WHAT WENT WRONG ====="
          sed -n '/What went wrong/,/Try:/p' /tmp/full_build.log || echo "No 'What went wrong' section found"
          echo ""
          echo "===== ERRORS ====="
          grep -i "error:" /tmp/full_build.log | grep -v "Caching disabled" | head -30 || echo "No error: lines found"
          echo ""
          echo "===== FAILURE BLOCK ====="
          grep -B 2 -A 30 "FAILURE: Build failed" /tmp/full_build.log || echo "No FAILURE block found"
          echo ""
          echo "===== LAST 50 LINES (filtered) ====="
          grep -v "Caching disabled" /tmp/full_build.log | tail -50
          echo "##[endgroup]"
          exit 1

      - name: Upload build log on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: /tmp/full_build.log
          retention-days: 7

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: DailyDisciplineTracker-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/*/release/*.apk
          retention-days: 30
          if-no-files-found: error
